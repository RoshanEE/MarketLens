AWSTemplateFormatVersion: '2010-09-09'
Description: MarketLens POC — Lightsail Containers (backend) + S3/CloudFront (frontend)

# DEPLOYMENT ORDER
# 1. Run "Deploy Infrastructure" workflow — creates Lightsail service, S3, CloudFront, IAM user
# 2. Copy stack Outputs into GitHub Secrets:
#      S3_BUCKET                     ← FrontendBucketName
#      CLOUDFRONT_DISTRIBUTION_ID    ← CloudFrontDistributionId
#      CLOUDFRONT_URL                ← CloudFrontUrl  (used to set CORS_ORIGINS below)
# 3. Create access keys for marketlens-github-deployer in IAM console, then add/update:
#      AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY in GitHub Secrets
# 4. Add backend secrets to GitHub Secrets (used by Deploy Backend workflow):
#      SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWT_SECRET
#      DATABASE_URL, ANTHROPIC_API_KEY, OPENAI_API_KEY
#      CORS_ORIGINS   e.g. ["https://d1234abcd.cloudfront.net"]  ← CloudFrontUrl output
# 5. Run "Deploy Backend" workflow — pushes image to Lightsail and creates deployment
# 6. Run "Deploy Frontend" workflow — full pipeline now works end to end
#      Add VITE_API_BASE_URL from Lightsail console (service URL shown after step 5)

# ── Parameters ────────────────────────────────────────────────────────────────
Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]
    Description: Environment name — appended to resource names to avoid conflicts

# ── Resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── Lightsail: backend container service ─────────────────────────────────────
  # Creates the service only — the actual container deployment (image + env vars)
  # is handled by the Deploy Backend GitHub Actions workflow via lightsailctl.
  LightsailBackend:
    Type: AWS::Lightsail::Container
    Properties:
      ServiceName: !Sub marketlens-backend-${Environment}
      Power: micro        # 0.5 vCPU, 1 GB RAM — $10/month
      Scale: 1

  # ── IAM: scoped deployer user for GitHub Actions ─────────────────────────────
  # After stack creation, go to IAM → Users → marketlens-github-deployer
  # → Security credentials → Create access key → use in GitHub Secrets.
  GitHubDeployerUser:
    Type: AWS::IAM::User
    Properties:
      UserName: marketlens-github-deployer

  GitHubDeployerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: marketlens-github-deployer
      Users:
        - !Ref GitHubDeployerUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Lightsail: push images and manage deployments
          - Effect: Allow
            Action:
              - lightsail:PushContainerImage
              - lightsail:CreateContainerServiceDeployment
              - lightsail:CreateContainerServiceRegistryLogin
              - lightsail:GetContainerServices
              - lightsail:GetContainerImages
              - lightsail:GetContainerServiceDeployments
            Resource: "*"
          # S3: sync frontend build artifacts
          - Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt FrontendBucket.Arn
              - !Sub ${FrontendBucket.Arn}/*
          # CloudFront: bust cache after each frontend deploy
          - Effect: Allow
            Action: cloudfront:CreateInvalidation
            Resource: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── S3: private bucket for compiled frontend assets ───────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub marketlens-poc-frontend-${Environment}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── CloudFront: Origin Access Control ────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub marketlens-poc-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront: distribution ──────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        # PriceClass_100 = US, Canada, Europe — cheapest option
        # Change to PriceClass_All for global coverage
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""  # must be empty when using OAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
        # React SPA: S3 returns 403 for unknown paths (private bucket),
        # remap to index.html so the client router handles the URL.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  # ── S3 bucket policy: allow CloudFront (via OAC) to read objects ──────────────
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

# ── Outputs ───────────────────────────────────────────────────────────────────
Outputs:
  LightsailServiceName:
    Value: !Sub marketlens-backend-${Environment}
    Description: Lightsail service name — the backend URL is shown in the Lightsail console after first deployment

  CloudFrontUrl:
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Description: Your app's public URL — also use as CORS_ORIGINS value in GitHub Secrets

  FrontendBucketName:
    Value: !Ref FrontendBucket
    Description: S3 bucket name — add to GitHub Secrets as S3_BUCKET

  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
    Description: Distribution ID — add to GitHub Secrets as CLOUDFRONT_DISTRIBUTION_ID

  GitHubDeployerUserName:
    Value: !Ref GitHubDeployerUser
    Description: >
      IAM user for CI. Go to IAM → Users → marketlens-github-deployer
      → Security credentials → Create access key, then update
      AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in GitHub Secrets.
