# Builds the backend Docker image, pushes it to Lightsail, and creates a new deployment.
# Lightsail does not use ECR — images are pushed directly via lightsailctl.
#
# Triggers:
#   • Pull requests to main — lint only, no deploy
#   • Manual: Actions → Deploy Backend → Run workflow → pick any branch
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY
#   DATABASE_URL
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY          (optional, leave empty if not used)
#   CORS_ORIGINS            e.g. ["https://d1234abcd.cloudfront.net"]

name: Deploy Backend

on:
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

env:
  LIGHTSAIL_SERVICE: marketlens-backend-dev   # must match ServiceName in cloudformation.yml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/
        working-directory: backend

  deploy:
    name: Build & Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install lightsailctl
        run: |
          curl -L -o lightsailctl https://s3.us-west-2.amazonaws.com/lightsailctl/latest/linux-amd64/lightsailctl
          sudo mv lightsailctl /usr/local/bin/lightsailctl
          sudo chmod +x /usr/local/bin/lightsailctl

      - name: Build Docker image
        run: docker build -t marketlens-backend:latest ./backend

      - name: Push image to Lightsail
        id: push
        run: |
          PUSH_OUTPUT=$(aws lightsail push-container-image \
            --service-name ${{ env.LIGHTSAIL_SERVICE }} \
            --label app \
            --image marketlens-backend:latest 2>&1)
          echo "--- push output ---"
          echo "$PUSH_OUTPUT"
          echo "-------------------"
          IMAGE=$(echo "$PUSH_OUTPUT" | grep -oE ':[a-zA-Z0-9_-]+\.[a-zA-Z0-9_-]+\.[0-9]+')
          echo "Resolved image: $IMAGE"
          if [[ -z "$IMAGE" ]]; then
            echo "ERROR: failed to parse image name from push output"
            exit 1
          fi
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Create deployment
        env:
          IMAGE: ${{ steps.push.outputs.image }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
        run: |
          CONTAINERS=$(jq -n \
            --arg image "$IMAGE" \
            --arg supabase_url "$SUPABASE_URL" \
            --arg supabase_anon_key "$SUPABASE_ANON_KEY" \
            --arg supabase_service_role_key "$SUPABASE_SERVICE_ROLE_KEY" \
            --arg database_url "$DATABASE_URL" \
            --arg anthropic_api_key "$ANTHROPIC_API_KEY" \
            --arg openai_api_key "$OPENAI_API_KEY" \
            --arg cors_origins "$CORS_ORIGINS" \
            '{
              "app": {
                "image": $image,
                "environment": {
                  "ENVIRONMENT": "production",
                  "DEBUG": "false",
                  "SUPABASE_URL": $supabase_url,
                  "SUPABASE_ANON_KEY": $supabase_anon_key,
                  "SUPABASE_SERVICE_ROLE_KEY": $supabase_service_role_key,
                  "DATABASE_URL": $database_url,
                  "ANTHROPIC_API_KEY": $anthropic_api_key,
                  "OPENAI_API_KEY": $openai_api_key,
                  "CORS_ORIGINS": $cors_origins
                },
                "ports": {"8000": "HTTP"}
              }
            }')

          ENDPOINT=$(jq -n '{
            "containerName": "app",
            "containerPort": 8000,
            "healthCheck": {
              "path": "/health",
              "intervalSeconds": 10,
              "timeoutSeconds": 5,
              "healthyThreshold": 2,
              "unhealthyThreshold": 3
            }
          }')

          aws lightsail create-container-service-deployment \
            --service-name ${{ env.LIGHTSAIL_SERVICE }} \
            --containers "$CONTAINERS" \
            --public-endpoint "$ENDPOINT"
