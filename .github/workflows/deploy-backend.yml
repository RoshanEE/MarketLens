# Builds the backend Docker image and pushes it to ECR.
# App Runner watches ECR for a new :latest digest and auto-deploys — no
# explicit deploy step needed here.
#
# Triggers:
#   • Push to main when backend files change
#   • Manual: Actions → Deploy Backend → Run workflow → pick any branch
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   ECR_REGISTRY    e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com

name: Deploy Backend

on:
  push:
    branches: [main, develop]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  pull_request:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/
        working-directory: backend

  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/marketlens-backend:${{ github.sha }}
            ${{ secrets.ECR_REGISTRY }}/marketlens-backend:latest
