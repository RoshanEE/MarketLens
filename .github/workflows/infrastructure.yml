# Deploys or updates the CloudFormation stack (Lightsail service + S3 + CloudFront + IAM).
# Manual trigger only — infrastructure should never change on a code push.
#
# Run from any branch via: Actions → Deploy Infrastructure → Run workflow
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION

name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        options: [dev, staging, prod]
        default: dev

jobs:
  deploy-stack:
    name: CloudFormation Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Clean up stuck stack
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name marketlens \
            --query "Stacks[0].StackStatus" \
            --output text 2>/dev/null || echo "DOES_NOT_EXIST")

          echo "Stack status: $STACK_STATUS"

          if [[ "$STACK_STATUS" == "ROLLBACK_FAILED" || \
                "$STACK_STATUS" == "CREATE_FAILED" || \
                "$STACK_STATUS" == "DELETE_FAILED" || \
                "$STACK_STATUS" == "ROLLBACK_COMPLETE" ]]; then
            echo "Stack is in unrecoverable state ($STACK_STATUS). Deleting before redeploy..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            ENV="${{ github.event.inputs.environment }}"
            aws s3 rm s3://marketlens-frontend-$ENV --recursive 2>/dev/null || true
            aws cloudformation delete-stack --stack-name marketlens
            aws cloudformation wait stack-delete-complete --stack-name marketlens
            echo "Stack deleted. Proceeding with fresh deploy."
          fi

      - name: Deploy stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/cloudformation.yml \
            --stack-name marketlens \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              Environment=${{ github.event.inputs.environment }}

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name marketlens \
            --query "Stacks[0].Outputs" \
            --output table
