# Builds the React app and syncs the output to S3, then busts the CloudFront cache.
# No Docker build — S3 + CloudFront serves the static files directly.
#
# Triggers:
#   • Push to main when frontend files change
#   • Manual: Actions → Deploy Frontend → Run workflow → pick any branch
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION
#   VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY   (baked in at build time)
#   VITE_API_BASE_URL                            (App Runner URL from CF stack output)
#   S3_BUCKET                                    (FrontendBucketName CF stack output)
#   CLOUDFRONT_DISTRIBUTION_ID                   (CloudFrontDistributionId CF stack output)
#
# Note: S3_BUCKET and CLOUDFRONT_DISTRIBUTION_ID are only available after the
# CloudFormation stack is deployed. The sync and invalidation steps are skipped
# gracefully if those secrets are not yet set (safe for the very first push).

name: Deploy Frontend

on:
  push:
    branches: [main, develop]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml
  pull_request:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  deploy:
    name: Build & Sync to S3
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        if: env.S3_BUCKET != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        if: env.S3_BUCKET != ''
        run: aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
