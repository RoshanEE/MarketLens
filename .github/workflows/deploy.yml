# CI/CD pipeline for MarketLens (POC)
#
# Backend:  lint → build Docker image → push to ECR
#           App Runner watches ECR and auto-deploys on new :latest push.
#
# Frontend: lint → build React app with VITE_ env vars → sync to S3 → bust CloudFront cache
#           No Docker build — S3/CloudFront serves the static files directly.
#
# Required GitHub Secrets (see infrastructure/cloudformation.yml for setup instructions):
#
#   Phase 1 (before deploying CloudFormation stack):
#     AWS_ACCESS_KEY_ID       — AWS credentials (swap for deployer user keys after stack is up)
#     AWS_SECRET_ACCESS_KEY
#     AWS_REGION              — e.g. us-east-1
#     ECR_REGISTRY            — e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com
#
#   Phase 2 (after CloudFormation stack is deployed):
#     VITE_API_BASE_URL             ← BackendUrl stack output
#     VITE_SUPABASE_URL             ← your Supabase project URL
#     VITE_SUPABASE_ANON_KEY        ← your Supabase anon key
#     S3_BUCKET                     ← FrontendBucketName stack output
#     CLOUDFRONT_DISTRIBUTION_ID    ← CloudFrontDistributionId stack output

name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check app/
        working-directory: backend

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  # ── Backend: build → push to ECR (App Runner auto-deploys from :latest) ──────
  deploy-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.ECR_REGISTRY }}/marketlens-backend:${{ github.sha }}
            ${{ secrets.ECR_REGISTRY }}/marketlens-backend:latest

  # ── Frontend: build React app → S3 → CloudFront invalidation ─────────────────
  # S3_BUCKET and CLOUDFRONT_DISTRIBUTION_ID are only available after the
  # CloudFormation stack is deployed. Steps that need them are skipped gracefully
  # on the first push (before the stack exists).
  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    if: github.ref == 'refs/heads/main'
    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Configure AWS credentials
        if: env.S3_BUCKET != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        if: env.S3_BUCKET != ''
        run: aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
